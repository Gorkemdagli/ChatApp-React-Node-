services:
  - type: web
    name: blink-chat-backend
    env: docker
    plan: free # Veya ihtiyaca göre 'starter'
    region: frankfurt # Türkiye'ye en yakın stabil bölge
    dockerContext: backend
    dockerfilePath: Dockerfile # Relatif to context
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        sync: false # Render kurulum ekranında manuel girebilirsin (Vercel URL'si)
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        value: "6379"
      - key: REDIS_PASSWORD
        sync: false
      - key: REDIS_TLS
        value: "true"
      - key: SWAGGER_USER
        sync: false # Örneğin: Gorkem
      - key: SWAGGER_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false # Supabase > Settings > Database > Connection String (Transaction mode)
    healthCheckPath: /health
    autoDeploy: true
