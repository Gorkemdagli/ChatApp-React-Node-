name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────────────────
# STAGE 1: LINT
# ──────────────────────────────────────
jobs:
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # Backend — TypeScript compilation check (acts as lint)
      - name: Backend — Install
        working-directory: ./backend
        run: npm ci

      - name: Backend — TypeScript Check
        working-directory: ./backend
        run: npx tsc --noEmit

      # Frontend — ESLint + TypeScript
      - name: Frontend — Install
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Frontend — ESLint
        working-directory: ./frontend
        run: npm run lint

      - name: Frontend — TypeScript Check
        working-directory: ./frontend
        run: npx tsc --noEmit

  # ──────────────────────────────────────
  # STAGE 2: TEST
  # ──────────────────────────────────────
  test-backend:
    name: 🧪 Test — Backend
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install
        run: npm ci

      - name: Run Tests with Coverage
        run: npm run test:coverage -- --runInBand
        env:
          NODE_ENV: test
          FRONTEND_URL: http://localhost:5173
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: placeholder-key-for-ci
          REDIS_PASSWORD: ci-test-password
          SWAGGER_USER: admin
          SWAGGER_PASSWORD: admin

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

  test-frontend:
    name: 🧪 Test — Frontend
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Run Tests with Coverage
        run: npx vitest run --coverage

      - name: Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  # ──────────────────────────────────────
  # STAGE 3: BUILD
  # ──────────────────────────────────────
  build-backend:
    name: 🔨 Build — Backend
    needs: test-backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install
        run: npm ci

      - name: Compile TypeScript
        run: npm run build

      - name: Verify dist output
        run: |
          test -f dist/index.js || (echo "❌ dist/index.js not found" && exit 1)
          echo "✅ Backend build verified"

  build-frontend:
    name: 🔨 Build — Frontend
    needs: test-frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Build Production Bundle
        run: npm run build

      - name: Verify dist output
        run: |
          test -d dist || (echo "❌ dist/ not found" && exit 1)
          echo "✅ Frontend build verified — $(du -sh dist | cut -f1)"

  # ──────────────────────────────────────
  # STAGE 4: E2E TESTS
  # ──────────────────────────────────────
  e2e:
    name: 🎭 E2E — Playwright
    needs: build-frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E Tests (Unauthenticated)
        run: npx playwright test --project=unauthenticated
        env:
          CI: true

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload Test Results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: frontend/test-results/
          retention-days: 7

  # ──────────────────────────────────────
  # STAGE 5: DOCKER BUILD
  # ──────────────────────────────────────
  docker:
    name: 🐳 Docker Build
    needs: [build-backend, build-frontend, e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: chat-app-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: chat-app-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Images
        run: |
          echo "✅ Docker images built successfully"
          docker images | grep chat-app
